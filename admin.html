<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Product Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <!-- 登录弹窗 -->
    <div id="login-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
            <h2 class="text-2xl font-bold text-gray-900 mb-6 text-center">Admin Login</h2>
            <form id="login-form">
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2 font-medium">Username</label>
                    <input type="text" id="username" class="w-full p-3 border border-gray-300 rounded-md" required>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 mb-2 font-medium">Password</label>
                    <input type="password" id="password" class="w-full p-3 border border-gray-300 rounded-md" required>
                </div>
                <button type="submit" class="w-full bg-blue-700 text-white py-3 rounded-md hover:bg-blue-800 transition font-medium">Login</button>
                <p id="login-error" class="text-red-600 text-center mt-4 hidden">Wrong username or password</p>
            </form>
        </div>
    </div>

    <!-- 后台管理主内容 -->
    <div id="admin-content" class="hidden max-w-4xl mx-auto px-4 py-12">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Product Management</h1>
            <div class="flex gap-4">
                <a href="/" class="bg-gray-600 text-white px-4 py-2 rounded-md hover:bg-gray-700 transition">Back to Website</a>
                <button id="logout-btn" class="bg-red-600 text-white px-4 py-2 rounded-md hover:bg-red-700 transition">Logout</button>
            </div>
        </div>

        <!-- 产品上传表单 -->
        <div class="bg-white p-8 rounded-lg shadow-md mb-12">
            <h2 class="text-2xl font-bold mb-6">Upload New Product</h2>
            <form id="product-form">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-gray-700 mb-2 font-medium">Product Name</label>
                        <input type="text" id="product-name" class="w-full p-3 border border-gray-300 rounded-md" required>
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2 font-medium">Price (USD)</label>
                        <input type="number" id="product-price" class="w-full p-3 border border-gray-300 rounded-md" step="0.01" min="0" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2 font-medium">Product Description</label>
                    <textarea id="product-desc" class="w-full p-3 border border-gray-300 rounded-md" rows="4" required></textarea>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 mb-2 font-medium">Product Image</label>
                    <input type="file" id="product-image" accept="image/*" class="w-full p-3 border border-gray-300 rounded-md" required>
                    <p class="text-gray-500 text-sm mt-1">Recommended size: 800x600px, JPG/PNG format</p>
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-green-600 text-white py-3 rounded-md hover:bg-green-700 transition font-medium">
                    <i class="fas fa-upload mr-2"></i> Upload Product
                </button>
            </form>
        </div>

        <!-- 已上传产品列表 -->
        <div class="bg-white p-8 rounded-lg shadow-md">
            <h2 class="text-2xl font-bold mb-6">Uploaded Products</h2>
            <div id="product-list" class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="border-b border-gray-200">
                            <th class="text-left py-3 px-4">Image</th>
                            <th class="text-left py-3 px-4">Name</th>
                            <th class="text-left py-3 px-4">Price</th>
                            <th class="text-left py-3 px-4">Action</th>
                        </tr>
                    </thead>
                    <tbody id="product-table-body">
                        <tr>
                            <td colspan="4" class="text-center py-8 text-gray-500">Loading products...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 登录账号密码配置
        const ADMIN_USER = 'admin';
        const ADMIN_PASS = 'admin930';

        // 元素获取
        const loginModal = document.getElementById('login-modal');
        const adminContent = document.getElementById('admin-content');
        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');
        const logoutBtn = document.getElementById('logout-btn');
        const productForm = document.getElementById('product-form');
        const productTableBody = document.getElementById('product-table-body');

        // 登录状态检查
        if (localStorage.getItem('admin_logged_in') === 'true') {
            loginModal.classList.add('hidden');
            adminContent.classList.remove('hidden');
            loadProducts();
        }

        // 登录提交
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username === ADMIN_USER && password === ADMIN_PASS) {
                localStorage.setItem('admin_logged_in', 'true');
                loginModal.classList.add('hidden');
                adminContent.classList.remove('hidden');
                loadProducts();
            } else {
                loginError.classList.remove('hidden');
            }
        });

        // 退出登录
        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('admin_logged_in');
            window.location.reload();
        });

        // 产品上传提交
        productForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Uploading...';

            try {
                // 1. 上传图片到R2
                const imageFile = document.getElementById('product-image').files[0];
                const formData = new FormData();
                formData.append('file', imageFile);
                const imageRes = await fetch('/api/upload-image', {
                    method: 'POST',
                    body: formData
                });

                if (!imageRes.ok) throw new Error('Image upload failed');
                const { imageUrl } = await imageRes.json();

                // 2. 上传产品数据到数据库
                const productData = {
                    name: document.getElementById('product-name').value,
                    description: document.getElementById('product-desc').value,
                    price: parseFloat(document.getElementById('product-price').value),
                    image_url: imageUrl
                };

                const productRes = await fetch('/api/products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(productData)
                });

                if (!productRes.ok) throw new Error('Product data upload failed');

                alert('Product uploaded successfully!');
                productForm.reset();
                loadProducts();

            } catch (error) {
                alert('Upload failed: ' + error.message);
                console.error('Upload error:', error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-upload mr-2"></i> Upload Product';
            }
        });

        // 加载产品列表
        async function loadProducts() {
            try {
                const res = await fetch('/api/products');
                if (!res.ok) throw new Error('Failed to load products');
                const products = await res.json();

                if (products.length === 0) {
                    productTableBody.innerHTML = '<tr><td colspan="4" class="text-center py-8 text-gray-500">No products uploaded yet</td></tr>';
                    return;
                }

                productTableBody.innerHTML = products.map(product => `
                    <tr class="border-b border-gray-200">
                        <td class="py-3 px-4"><img src="${product.image_url}" alt="${product.name}" class="w-20 h-16 object-cover rounded"></td>
                        <td class="py-3 px-4 font-medium">${product.name}</td>
                        <td class="py-3 px-4">$${product.price.toFixed(2)}</td>
                        <td class="py-3 px-4">
                            <button class="delete-btn bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600" data-id="${product.id}">Delete</button>
                        </td>
                    </tr>
                `).join('');

                // 绑定删除事件
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', () => deleteProduct(btn.dataset.id));
                });

            } catch (error) {
                productTableBody.innerHTML = '<tr><td colspan="4" class="text-center py-8 text-red-600">Failed to load products</td></tr>';
                console.error('Load products error:', error);
            }
        }

        // 删除产品功能
        async function deleteProduct(productId) {
            if (!confirm('Are you sure you want to delete this product?')) return;
            
            try {
                const res = await fetch(`/api/products?id=${productId}`, {
                    method: 'DELETE'
                });
                if (!res.ok) throw new Error('Delete failed');
                alert('Product deleted successfully!');
                loadProducts();
            } catch (error) {
                alert('Delete failed: ' + error.message);
                console.error('Delete error:', error);
            }
        }
    </script>
</body>
</html>
