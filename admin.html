<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Admin | Product Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <!-- 登录弹窗 -->
    <div id="login-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
            <h2 class="text-2xl font-bold text-gray-900 mb-6 text-center" data-lang="login.title">Admin Login</h2>
            <form id="login-form">
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2 font-medium" data-lang="login.username">Username</label>
                    <input type="text" id="username" class="w-full p-3 border border-gray-300 rounded-md" required>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 mb-2 font-medium" data-lang="login.password">Password</label>
                    <input type="password" id="password" class="w-full p-3 border border-gray-300 rounded-md" required>
                </div>
                <button type="submit" class="w-full bg-blue-700 text-white py-3 rounded-md hover:bg-blue-800 transition font-medium" data-lang="login.btn">Login</button>
                <p id="login-error" class="text-red-600 text-center mt-4 hidden" data-lang="login.error">Wrong username or password</p>
            </form>
        </div>
    </div>

    <!-- 后台管理主内容 -->
    <div id="admin-content" class="hidden max-w-6xl mx-auto px-4 py-12">
        <div class="flex justify-between items-center mb-8 flex-wrap gap-4">
            <h1 class="text-3xl font-bold text-gray-900" data-lang="admin.title">Product Management</h1>
            <div class="flex items-center gap-4 flex-wrap">
                <!-- 语言切换 -->
                <select id="lang-select" class="bg-gray-100 border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="en">English</option>
                    <option value="fr">Français</option>
                    <option value="de">Deutsch</option>
                    <option value="ar">العربية</option>
                    <option value="es">Español</option>
                    <option value="it">Italiano</option>
                </select>
                <a href="/" class="bg-gray-600 text-white px-4 py-2 rounded-md hover:bg-gray-700 transition" data-lang="admin.back">Back to Website</a>
                <button id="logout-btn" class="bg-red-600 text-white px-4 py-2 rounded-md hover:bg-red-700 transition" data-lang="admin.logout">Logout</button>
            </div>
        </div>

        <!-- 产品上传表单 -->
        <div class="bg-white p-8 rounded-lg shadow-md mb-12">
            <h2 class="text-2xl font-bold mb-6" data-lang="upload.title">Upload New Product</h2>
            <form id="product-form">
                <!-- 通用字段 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-gray-700 mb-2 font-medium" data-lang="upload.price">Price (USD)</label>
                        <input type="number" id="product-price" class="w-full p-3 border border-gray-300 rounded-md" step="0.01" min="0" required>
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2 font-medium" data-lang="upload.image">Product Image</label>
                        <input type="file" id="product-image" accept="image/*" class="w-full p-3 border border-gray-300 rounded-md" required>
                        <p class="text-gray-500 text-sm mt-1" data-lang="upload.imageTip">Recommended size: 800x600px, JPG/PNG format</p>
                    </div>
                </div>

                <!-- 6语种字段选项卡 -->
                <div class="mb-6 border-b border-gray-200">
                    <div class="flex overflow-x-auto gap-2 pb-2" id="lang-tabs">
                        <button type="button" class="lang-tab px-4 py-2 font-medium border-b-2 border-blue-700 text-blue-700" data-lang-code="en">English (Required)</button>
                        <button type="button" class="lang-tab px-4 py-2 font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700" data-lang-code="fr">Français</button>
                        <button type="button" class="lang-tab px-4 py-2 font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700" data-lang-code="de">Deutsch</button>
                        <button type="button" class="lang-tab px-4 py-2 font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700" data-lang-code="ar">العربية</button>
                        <button type="button" class="lang-tab px-4 py-2 font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700" data-lang-code="es">Español</button>
                        <button type="button" class="lang-tab px-4 py-2 font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700" data-lang-code="it">Italiano</button>
                    </div>
                </div>

                <!-- 语种字段内容区 -->
                <div id="lang-fields">
                    <!-- 英语字段（必填，默认显示） -->
                    <div class="lang-field-panel" data-lang-panel="en">
                        <div class="mb-4">
                            <label class="block text-gray-700 mb-2 font-medium">Product Name (English) *</label>
                            <input type="text" id="product-name-en" class="w-full p-3 border border-gray-300 rounded-md" required>
                        </div>
                        <div class="mb-4">
                            <label class="block text-gray-700 mb-2 font-medium">Product Description (English) *</label>
                            <textarea id="product-desc-en" class="w-full p-3 border border-gray-300 rounded-md" rows="4" required></textarea>
                        </div>
                    </div>
                    <!-- 其他语种字段（可选，默认隐藏） -->
                    <div class="lang-field-panel hidden" data-lang-panel="fr">
                        <div class="mb-4">
                            <label class="block text-gray-700 mb-2 font-medium">Nom du Produit (Français)</label>
                            <input type="text" id="product-name-fr" class="w-full p-3 border border-gray-300 rounded-md">
                        </div>
                        <div class="mb-4">
                            <label class="block text-gray-700 mb-2 font-medium">Description du Produit (Français)</label>
                            <textarea id="product-desc-fr" class="w-full p-3 border border-gray-300 rounded-md" rows="4"></textarea>
                        </div>
                    </div>
                    <div class="lang-field-panel hidden" data-lang-panel="de">
                        <div class="mb-4">
                            <label class="block text-gray-700 mb-2 font-medium">Produktname (Deutsch)</label>
                            <input type="text" id="product-name-de" class="w-full p-3 border border-gray-300 rounded-md">
                        </div>
                        <div class="mb-4">
                            <label class="block text-gray-700 mb-2 font-medium">Produktbeschreibung (Deutsch)</label>
                            <textarea id="product-desc-de" class="w-full p-3 border border-gray-300 rounded-md" rows="4"></textarea>
                        </div>
                    </div>
                    <div class="lang-field-panel hidden" data-lang-panel="ar">
                        <div class="mb-4">
                            <label class="block text-gray-700 mb-2 font-medium">اسم المنتج (العربية)</label>
                            <input type="text" id="product-name-ar" class="w-full p-3 border border-gray-300 rounded-md text-right" dir="rtl">
                        </div>
                        <div class="mb-4">
                            <label class="block text-gray-700 mb-2 font-medium">وصف المنتج (العربية)</label>
                            <textarea id="product-desc-ar" class="w-full p-3 border border-gray-300 rounded-md text-right" dir="rtl" rows="4"></textarea>
                        </div>
                    </div>
                    <div class="lang-field-panel hidden" data-lang-panel="es">
                        <div class="mb-4">
                            <label class="block text-gray-700 mb-2 font-medium">Nombre del Producto (Español)</label>
                            <input type="text" id="product-name-es" class="w-full p-3 border border-gray-300 rounded-md">
                        </div>
                        <div class="mb-4">
                            <label class="block text-gray-700 mb-2 font-medium">Descripción del Producto (Español)</label>
                            <textarea id="product-desc-es" class="w-full p-3 border border-gray-300 rounded-md" rows="4"></textarea>
                        </div>
                    </div>
                    <div class="lang-field-panel hidden" data-lang-panel="it">
                        <div class="mb-4">
                            <label class="block text-gray-700 mb-2 font-medium">Nome del Prodotto (Italiano)</label>
                            <input type="text" id="product-name-it" class="w-full p-3 border border-gray-300 rounded-md">
                        </div>
                        <div class="mb-4">
                            <label class="block text-gray-700 mb-2 font-medium">Descrizione del Prodotto (Italiano)</label>
                            <textarea id="product-desc-it" class="w-full p-3 border border-gray-300 rounded-md" rows="4"></textarea>
                        </div>
                    </div>
                </div>

                <!-- 提交按钮 -->
                <button type="submit" id="submit-btn" class="w-full bg-green-600 text-white py-3 rounded-md hover:bg-green-700 transition font-medium mt-4">
                    <i class="fas fa-upload mr-2"></i> <span data-lang="upload.btn">Upload Product</span>
                </button>
            </form>
        </div>

        <!-- 已上传产品列表 -->
        <div class="bg-white p-8 rounded-lg shadow-md">
            <h2 class="text-2xl font-bold mb-6" data-lang="list.title">Uploaded Products</h2>
            <div id="product-list" class="overflow-x-auto">
                <table class="w-full min-w-[600px]">
                    <thead>
                        <tr class="border-b border-gray-200">
